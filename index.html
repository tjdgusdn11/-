<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>모바일 신분증</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f2f3f5;
}

/* 전체 컨테이너 (핸드폰 꽉 채우기) */
.container {
  max-width:100%;
  margin:0 auto;
}

/* 상단 */
.header {
  padding:15px;
  background:white;
  font-weight:bold;
  font-size:18px;
}

/* 카드 */
.card {
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:12px;
  align-items:center;
}

.photo {
  width:80px;
  height:80px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  border-radius:6px;
}

/* 정보 */
.info {
  font-size:14px;
}

/* 타이머 */
.timer {
  margin:0 15px;
  font-size:14px;
}

/* 바 */
.bar {
  margin:5px 15px 15px;
  height:6px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.bar-inner {
  height:100%;
  width:100%;
  background:linear-gradient(to right, blue, purple);
}

/* 버튼 */
.btn {
  margin:15px;
  background:black;
  color:white;
  text-align:center;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
}

/* QR 영역 */
.qr-box {
  display:none;
  justify-content:center;
  margin:20px 0 40px;
}

/* ⭐ 핵심: QR 크기 제한 */
#qrcode {
  width:220px;
  height:220px;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">모바일 신분증</div>

  <div class="card">
    <div class="photo">사진</div>
    <div class="info">
      <b>성현우</b><br>
      060219-*******<br>
      전주시 덕진구
    </div>
  </div>

  <div class="timer">30초</div>

  <div class="bar">
    <div class="bar-inner"></div>
  </div>

  <div class="btn" onclick="showQR()">QR 표시</div>

  <div class="qr-box" id="qrBox">
    <div id="qrcode"></div>
  </div>

</div>

<script>
function showQR(){
  document.getElementById("qrBox").style.display="flex";

  document.getElementById("qrcode").innerHTML="";

  new QRCode(document.getElementById("qrcode"), {
    text: "*********",   // 주소 숨김 처리
    width: 220,
    height: 220
  });
}
</script>

</body>
</html>
