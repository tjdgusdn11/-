<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>모바일신분증</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
}

.header {
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
  background: white;
  display: flex;
  justify-content: space-between;
}

.menu {
  font-size: 22px;
}

.card {
  margin: 10px;
  padding: 20px;
  background: white;
  border-radius: 16px;
}

.profile {
  width: 100%;
  height: 200px;
  background: #ddd;
  border-radius: 12px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 10px;
}

/* 🔥 메뉴 패널 */
#menuPanel {
  position: fixed;
  top: 0;
  right: -100%;
  width: 80%;
  height: 100%;
  background: white;
  padding: 20px;
  transition: 0.3s;
}

#menuPanel.active {
  right: 0;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div class="menu" id="menuBtn">☰</div>
</div>

<div class="card">
  <div class="profile"></div>
  <h3>홍길동</h3>
  <p>2008-01-01 - 1234567</p>
  <p>전주시</p>
  <button>QR정보 표시</button>
</div>

<!-- 🔥 숨겨진 메뉴 -->
<div id="menuPanel">
  <h3>정보 설정</h3>
  <input placeholder="이름"><br><br>
  <input placeholder="생년월일"><br><br>
  <input placeholder="주소"><br><br>
  <button>저장</button>
</div>

<script>
const menuBtn = document.getElementById("menuBtn");
const menuPanel = document.getElementById("menuPanel");

menuBtn.onclick = () => {
  menuPanel.classList.toggle("active");
};
</script>

</body>
</html>
