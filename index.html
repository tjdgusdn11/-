<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:sans-serif;
  background:#f2f3f5;
}

/* 상단 */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:white;
  font-weight:bold;
}

/* 카드 */
.container {
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:20px;
  position:relative;
}

/* 🔥 사진 가운데 위 */
#profile {
  width:110px;
  height:110px;
  object-fit:cover;
  border-radius:10px;
  display:block;
  margin:0 auto 15px auto; /* 핵심 */
}

/* 텍스트 */
.name {
  font-size:20px;
  font-weight:bold;
  text-align:left;
}

.info {
  font-size:13px;
  color:#555;
  text-align:left;
}

/* 🔥 QR 오른쪽 */
.qr {
  position:absolute;
  right:20px;
  top:20px;
  width:100px;
  height:100px;
  display:none;
}

/* 하단 고정 */
.bottom {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:15px;
  background:#f2f3f5;
}

/* 타이머 */
.timer {
  margin-bottom:10px;
}

.bar {
  height:6px;
  background:#ddd;
  border-radius:5px;
  overflow:hidden;
}

.bar-inner {
  height:100%;
  width:100%;
  background:linear-gradient(to right,blue,purple);
}

/* 버튼 */
.btn {
  width:100%;
  background:black;
  color:white;
  padding:15px;
  text-align:center;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>정부24</div>
  <div>≡</div>
</div>

<div class="container">
  <div class="card">

    <!-- 사진 -->
    <img id="profile" src="https://placehold.co/110">

    <!-- 텍스트 -->
    <div class="name" id="name">홍길동</div>
    <div class="info" id="dob">20000101-******</div>
    <div class="info" id="addr">********</div>

    <!-- QR -->
    <div id="qr" class="qr"></div>

  </div>
</div>

<!-- 하단 -->
<div class="bottom">

  <div class="timer">
    <div id="timeText">30초</div>
    <div class="bar">
      <div class="bar-inner" id="bar"></div>
    </div>
  </div>

  <div class="btn" onclick="toggle()" id="btn">
    QR 표시
  </div>

</div>

<script>
let isQR=false;

new QRCode(document.getElementById("qr"), {
  text:"QR-ID",
  width:100,
  height:100
});

function toggle(){
  const qr=document.getElementById("qr");
  const dob=document.getElementById("dob");
  const addr=document.getElementById("addr");
  const btn=document.getElementById("btn");

  if(!isQR){
    qr.style.display="block";
    dob.innerText="20000101-******";
    addr.innerText="********";
    btn.innerText="상세정보 표시";
    isQR=true;
  } else {
    qr.style.display="none";
    dob.innerText="20000101-1234567";
    addr.innerText="서울시 강남구";
    btn.innerText="QR 표시";
    isQR=false;
  }
}

/* 타이머 */
let time=30;
setInterval(()=>{
  time--;
  if(time<0) time=30;

  document.getElementById("timeText").innerText=time+"초";
  document.getElementById("bar").style.width=(time/30*100)+"%";
},1000);
</script>

</body>
</html>
