<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
  overflow:hidden;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-weight:bold;
  font-size:20px;
}

/* 카드 */
.card{
  background:#fff;
  margin:20px;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 로고 */
.logo{
  width:80px;
  margin:10px auto;
}

/* 이름 */
.name{
  margin-top:10px;
  font-weight:bold;
}

/* QR 영역 */
.qrBox{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:15px 0;
}

.qr{
  width:110px;
}

/* 타이머 */
.timer{
  font-size:13px;
  color:#555;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
  border-radius:10px;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:20px;
  left:0;
  width:100%;
  padding:0 20px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:#000;
  color:#fff;
  font-weight:bold;
  font-size:16px;
}

/* 설정 */
.menu{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.menu.active{
  right:0;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div onclick="openMenu()">☰</div>
</div>

<div class="card">

  <!-- 로고 -->
  <img src="https://i.imgur.com/6o5VY6T.png" class="logo">

  <!-- 이름 -->
  <div class="name" id="name">틱톡 wjdqn24</div>

  <!-- QR -->
  <div class="qrBox">
    <img id="qr" class="qr">
  </div>

  <!-- 타이머 -->
  <div class="timer">남은시간 <span id="time">30</span>초</div>
  <div class="bar"><div id="fill" class="fill"></div></div>

</div>

<div class="bottom">
  <button onclick="toggle()" id="btn">상세정보 표시</button>
</div>

<!-- 설정 -->
<div id="menu" class="menu">
  <h3>설정</h3>
  이름 <input id="setName"><br><br>
  <button onclick="save()">저장</button>
</div>

<script>
let sec=30;
let mode="qr";
let clickCount=0;

/* QR 생성 */
function makeQR(){
  document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+Date.now();
}
makeQR();

/* 타이머 */
setInterval(()=>{
  sec--;
  if(sec<=0){
    sec=30;
    makeQR();
  }
  document.getElementById("time").innerText=sec;
  document.getElementById("fill").style.width=(sec/30*100)+"%";
},1000);

/* 전환 */
function toggle(){
  if(mode==="qr"){
    document.getElementById("qr").style.display="none";
    document.getElementById("name").innerText="●●●●●●";
    document.getElementById("btn").innerText="QR정보 표시";
    mode="info";
  }else{
    document.getElementById("qr").style.display="block";
    document.getElementById("name").innerText="틱톡 wjdqn24";
    document.getElementById("btn").innerText="상세정보 표시";
    mode="qr";
  }
}

/* 5번 눌러 설정 */
function openMenu(){
  clickCount++;
  if(clickCount>=5){
    document.getElementById("menu").classList.add("active");
    clickCount=0;
  }
}

/* 저장 */
function save(){
  document.getElementById("name").innerText =
    document.getElementById("setName").value;

  document.getElementById("menu").classList.remove("active");
}
</script>

</body>
</html>
