<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  padding:18px;
  font-size:21px;
  font-weight:bold;
}

/* 카드 */
.card{
  background:#fff;
  margin:15px;
  border-radius:20px;
  padding:20px;
}

/* 사진 */
.photo{
  width:170px;
  height:210px;
  object-fit:cover;
  border-radius:15px;
  display:block;
  margin:0 auto 15px;
}

/* 정보 */
.row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.info{
  flex:1;
}

#name{
  font-size:20px;
  font-weight:bold;
}

#birth,#addr{
  font-size:13px;
  color:#666;
}

/* QR */
.qr{
  width:110px;
}

/* 타이머 (🔥 버튼 위 고정) */
.timer-wrap{
  position:fixed;
  bottom:95px;
  width:100%;
  text-align:center;
}

.timer-text{
  font-size:14px;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
  margin:5px 20px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}

.btn{
  width:90%;
  padding:15px;
  background:black;
  color:white;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

/* 설정 */
.setting{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.setting.active{
  right:0;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div id="menu">≡</div>
</div>

<div class="card">

  <img id="photo" class="photo">

  <div class="row">
    <div class="info">
      <div id="name">홍길동</div>
      <div id="birth">•••••• - •••••••</div>
      <div id="addr">••••••</div>
    </div>

    <img id="qr" class="qr">
  </div>

</div>

<!-- 🔥 타이머 -->
<div class="timer-wrap">
  <div class="timer-text">남은시간 <span id="time">30</span>초</div>
  <div class="bar">
    <div class="fill" id="bar"></div>
  </div>
</div>

<div class="bottom">
  <div class="btn" id="toggle">상세정보 표시</div>
</div>

<!-- 설정 -->
<div class="setting" id="setting">

  <!-- 🔥 오른쪽 위 텍스트 -->
  <div style="position:absolute; top:15px; right:15px; font-size:12px; color:#999;">
    이걸만든성현우
  </div>

  <h2>설정</h2>

  <input id="inputName" placeholder="이름">
  <input id="inputBirth" placeholder="생년월일">
  <input id="inputBack" placeholder="뒷자리">
  <input id="inputAddr" placeholder="주소">
  <input type="file" id="file">

  <button onclick="save()">저장</button>
</div>

<script>
const nameEl = document.getElementById("name");
const birthEl = document.getElementById("birth");
const addrEl = document.getElementById("addr");
const qrEl = document.getElementById("qr");

let isDetail=false;

/* QR */
function makeQR(){
  qrEl.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+nameEl.innerText;
}

/* 토글 */
document.getElementById("toggle").onclick=function(){
  isDetail=!isDetail;

  if(isDetail){
    birthEl.innerText=localStorage.birth+" - "+localStorage.back;
    addrEl.innerText=localStorage.addr;
    qrEl.style.display="none";
    this.innerText="QR정보 표시";
  }else{
    birthEl.innerText="•••••• - •••••••";
    addrEl.innerText="••••••";
    qrEl.style.display="block";
    this.innerText="상세정보 표시";
  }
};

/* 설정 5번 */
let count=0;
menu.onclick=function(){
  count++;
  if(count>=5){
    setting.classList.add("active");
    count=0;
  }
};

/* 저장 */
function save(){
  localStorage.name=inputName.value;
  localStorage.birth=inputBirth.value;
  localStorage.back=inputBack.value;
  localStorage.addr=inputAddr.value;

  nameEl.innerText=localStorage.name;

  makeQR();
  setting.classList.remove("active");
}

/* 사진 */
file.onchange=function(e){
  let reader=new FileReader();
  reader.onload=function(){
    photo.src=reader.result;
    localStorage.photo=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
};

/* 타이머 */
let t=30;
setInterval(()=>{
  t--;
  if(t<=0) t=30;
  time.innerText=t;
  bar.style.width=(t/30*100)+"%";
},1000);

/* 초기 */
window.onload=function(){
  if(localStorage.name){
    nameEl.innerText=localStorage.name;
  }

  if(localStorage.photo){
    photo.src=localStorage.photo;
  }

  makeQR();
};
</script>

</body>
</html>
