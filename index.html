<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-weight:bold;
  font-size:20px;
}

/* 카드 */
.card{
  background:#fff;
  margin:15px;
  border-radius:20px;
  padding:20px;
}

/* 사진 */
.photo{
  width:160px;
  height:200px;
  border-radius:15px;
  object-fit:cover;
  display:block;
  margin:0 auto 15px;
}

/* 정보 */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  flex:1;
}

#name{
  font-size:20px;
  font-weight:bold;
}

#birth,#addr{
  font-size:13px;
  color:#555;
}

/* QR */
.qr{
  width:110px;
}

/* 타이머 */
.timer{
  text-align:center;
  margin-top:10px;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
  margin:5px 20px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
  border-radius:10px;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}

.btn{
  width:90%;
  padding:15px;
  background:black;
  color:white;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

/* 설정 */
.setting{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:white;
  padding:20px;
  transition:0.3s;
}

.setting.active{
  right:0;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div id="menu">≡</div>
</div>

<div class="card">

<img id="photo" class="photo">

<div class="row">
  <div class="info">
    <div id="name">홍길동</div>
    <div id="birth">•••••• - •••••••</div>
    <div id="addr">••••••</div>
  </div>

  <img id="qr" class="qr">
</div>

</div>

<div class="timer">
  남은시간 <span id="time">30</span>초
</div>

<div class="bar">
  <div class="fill" id="bar"></div>
</div>

<div class="bottom">
  <div class="btn" id="toggle">상세정보 표시</div>
</div>

<!-- 설정 -->
<div class="setting" id="setting">
  <h2>설정</h2>

  <input id="inputName" placeholder="이름">
  <input id="inputBirth" placeholder="생년월일">
  <input id="inputBack" placeholder="뒷자리">
  <input id="inputAddr" placeholder="주소">
  <input type="file" id="file">

  <button onclick="save()">저장</button>
</div>

<script>

/* 🔥 데이터 구조 */
let data = {
  name:"",
  birth:"",
  back:"",
  addr:"",
  photo:""
};

let isDetail=false;

/* 저장 불러오기 */
function load(){
  let saved = localStorage.getItem("user");

  if(saved){
    data = JSON.parse(saved);
  }

  render();
}

/* 저장 */
function save(){

  data.name = inputName.value;
  data.birth = inputBirth.value;
  data.back = inputBack.value;
  data.addr = inputAddr.value;

  localStorage.setItem("user", JSON.stringify(data));

  render();

  setting.classList.remove("active");
}

/* 화면 반영 */
function render(){

  name.innerText = data.name || "홍길동";

  if(isDetail){
    birth.innerText = data.birth+" - "+data.back;
    addr.innerText = data.addr;
  }else{
    birth.innerText = "•••••• - •••••••";
    addr.innerText = "••••••";
  }

  if(data.photo){
    photo.src = data.photo;
  }

  makeQR();
}

/* QR */
function makeQR(){
  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+data.name;
}

/* 토글 */
toggle.onclick=function(){

  isDetail = !isDetail;

  if(isDetail){
    this.innerText="QR정보 표시";
  }else{
    this.innerText="상세정보 표시";
  }

  render();
};

/* 설정 5번 */
let count=0;
menu.onclick=function(){
  count++;
  if(count>=5){
    setting.classList.add("active");
    count=0;
  }
};

/* 사진 */
file.onchange=function(e){
  let reader=new FileReader();
  reader.onload=function(){
    data.photo = reader.result;
    localStorage.setItem("user", JSON.stringify(data));
    render();
  }
  reader.readAsDataURL(e.target.files[0]);
};

/* 타이머 */
let sec=30;
setInterval(()=>{
  sec--;
  if(sec<=0) sec=30;

  time.innerText=sec;
  bar.style.width=(sec/30*100)+"%";
},1000);

/* 시작 */
load();

</script>

</body>
</html>
