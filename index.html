<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 신분증</title>

<style>
body { margin:0; font-family:-apple-system; background:#f2f2f7; }

.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-weight:bold;
}

.card {
  background:white;
  margin:10px;
  padding:20px;
  border-radius:16px;
}

.profile {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  background:#ddd;
}

.qrBox {
  display:none;
  justify-content:center;
  margin-top:10px;
}

.timer {
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

.progress {
  width:100%;
  height:6px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:100%;
  background:linear-gradient(to right,blue,purple);
}

button {
  width:100%;
  padding:14px;
  border:none;
  background:black;
  color:white;
  border-radius:10px;
  margin-top:10px;
}

/* 설정창 */
.settings {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  width:80%;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div onclick="tapMenu()">☰</div>
</div>

<div class="card">

<img id="photo" class="profile" src="https://via.placeholder.com/300">

<h3 id="name">홍길동</h3>
<p id="birth">2008-01-01 - 1234567</p>
<p id="address">전주시</p>

<div id="qrBox" class="qrBox"></div>

<div id="timer" class="timer">남은시간 30초</div>

<div class="progress">
  <div id="bar" class="bar"></div>
</div>

<button id="toggleBtn" onclick="toggleView()">QR정보 표시</button>

</div>

<!-- 설정 -->
<div id="settings" class="settings">
  <div class="box">
    <h3>정보 설정</h3>
    <input id="inputName" placeholder="이름"><br><br>
    <input id="inputBirth" placeholder="생년월일"><br><br>
    <input id="inputId" placeholder="뒷자리"><br><br>
    <input id="inputAddress" placeholder="주소"><br><br>
    <input type="file" id="inputPhoto"><br><br>
    <button onclick="saveData()">저장</button>
  </div>
</div>

<script>
let tap=0;
let isQR=false;
let time=30;

let current={
  name:"홍길동",
  birth:"2008-01-01",
  id:"1234567",
  address:"전주시",
  photo:"https://via.placeholder.com/300"
};

function render(){
  name.innerText=current.name;
  birth.innerText=current.birth+" - "+current.id;
  address.innerText=current.address;
  photo.src=current.photo;
}

function tapMenu(){
  tap++;
  if(tap>=5){
    settings.style.display="flex";
    tap=0;
  }
}

function saveData(){
  current.name=inputName.value || current.name;
  current.birth=inputBirth.value || current.birth;
  current.id=inputId.value || current.id;
  current.address=inputAddress.value || current.address;

  let file=inputPhoto.files[0];

  if(file){
    let reader=new FileReader();
    reader.onload=function(e){
      current.photo=e.target.result;
      render();
    }
    reader.readAsDataURL(file);
  } else {
    render();
  }

  settings.style.display="none";

  if(isQR){
    renderQR();
  }
}

function renderQR(){
  qrBox.innerHTML="";

  let data={
    name:current.name,
    birth:current.birth,
    id:current.id,
    address:current.address
  };

  let img=document.createElement("img");
  img.src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="
    + encodeURIComponent(JSON.stringify(data));

  qrBox.appendChild(img);
}

function toggleView(){
  isQR=!isQR;

  if(isQR){
    name.innerText="•••";
    birth.innerText="•••••• - •••••••";
    address.innerText="••••••••";
    renderQR();
    qrBox.style.display="flex";
    toggleBtn.innerText="상세정보 표시";
  }else{
    render();
    qrBox.style.display="none";
    toggleBtn.innerText="QR정보 표시";
  }
}

/* 타이머 */
setInterval(()=>{
  time--;
  if(time<=0) time=30;
  timer.innerText="남은시간 "+time+"초";
  bar.style.width=(time/30)*100+"%";
},1000);

render();
</script>

</body>
</html>
