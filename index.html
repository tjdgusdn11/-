<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
}

.header{
  padding:15px;
  font-weight:bold;
  font-size:20px;
}

.container{
  background:#fff;
  margin:15px;
  border-radius:20px;
  padding:20px;
}

.photo{
  width:150px;
  height:150px;
  background:#ddd;
  border-radius:15px;
  margin:0 auto;
  display:block;
}

.name{
  font-weight:bold;
  font-size:20px;
  margin-top:15px;
}

.sub{
  color:#555;
  margin-top:5px;
}

#qr{
  position:absolute;
  right:20px;
  bottom:20px;
}

.timer-wrap{
  margin:20px;
}

.bar{
  height:6px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.bar-inner{
  height:100%;
  width:100%;
  background:linear-gradient(to right, blue, purple);
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  padding:15px;
  background:#fff;
}

.btn{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
  border-radius:10px;
}

#settings{
  display:none;
  padding:20px;
}

input{
  display:block;
  margin:10px 0;
  width:100%;
  padding:10px;
}
</style>
</head>

<body>

<div class="header" onclick="tap()">정부24</div>

<div class="container">
  <div style="position:relative">

    <!-- 사진 (가운데 위) -->
    <img id="img" class="photo" src="">

    <!-- QR -->
    <div id="qr"></div>

    <!-- 정보 -->
    <div class="name" id="name">홍길동</div>
    <div class="sub" id="dob">20000101-1234567</div>
    <div class="sub" id="addr">서울시 강남구</div>

  </div>
</div>

<!-- 타이머 -->
<div class="timer-wrap">
  <div id="time">30초</div>
  <div class="bar">
    <div id="bar" class="bar-inner"></div>
  </div>
</div>

<!-- 버튼 -->
<div class="bottom">
  <div class="btn" id="btn" onclick="toggle()">QR 표시</div>
</div>

<!-- 설정 -->
<div id="settings">
  <h3>설정</h3>

  이름 <input id="setName">
  생년월일 앞 <input id="setDob1">
  생년월일 뒤 <input id="setDob2">
  주소 <input id="setAddr">
  사진 <input type="file" id="setImg">

  <button onclick="save()">저장</button>
</div>

<script>

let isQR=false;
let tapCount=0;

// 저장 데이터
let savedName="홍길동";
let savedDob1="20000101";
let savedDob2="1234567";
let savedAddr="서울시 강남구";

// 🔥 5번 클릭 설정
function tap(){
  tapCount++;
  if(tapCount===5){
    document.querySelector(".container").style.display="none";
    document.querySelector(".bottom").style.display="none";
    document.getElementById("settings").style.display="block";
    tapCount=0;
  }
}

// 저장
function save(){
  savedName = document.getElementById("setName").value || savedName;
  savedDob1 = document.getElementById("setDob1").value || savedDob1;
  savedDob2 = document.getElementById("setDob2").value || savedDob2;
  savedAddr = document.getElementById("setAddr").value || savedAddr;

  document.getElementById("name").innerText = savedName;
  document.getElementById("dob").innerText = savedDob1 + "-" + savedDob2;
  document.getElementById("addr").innerText = savedAddr;

  // 사진
  const file=document.getElementById("setImg").files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){
      document.getElementById("img").src=e.target.result;
    }
    reader.readAsDataURL(file);
  }

  document.querySelector(".container").style.display="block";
  document.querySelector(".bottom").style.display="block";
  document.getElementById("settings").style.display="none";
}

// QR 생성
function makeQR(){
  const qr=document.getElementById("qr");
  qr.innerHTML="";
  new QRCode(qr,{
    text:"QR-ID",
    width:110,
    height:110
  });
}

// 토글
function toggle(){
  const qr=document.getElementById("qr");
  const dob=document.getElementById("dob");
  const addr=document.getElementById("addr");
  const btn=document.getElementById("btn");

  if(!isQR){
    makeQR();
    qr.style.display="block";

    dob.innerText = savedDob1 + "-******";
    addr.innerText = "********";

    btn.innerText="상세정보 표시";
    isQR=true;

  }else{
    qr.style.display="none";

    dob.innerText = savedDob1 + "-" + savedDob2;
    addr.innerText = savedAddr;

    btn.innerText="QR 표시";
    isQR=false;
  }
}

// 타이머
let t=30;
setInterval(()=>{
  t--;
  if(t<0) t=30;

  document.getElementById("time").innerText=t+"초";
  document.getElementById("bar").style.width=(t/30*100)+"%";
},1000);

</script>

</body>
</html>
